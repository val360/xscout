name: Build & Deploy to ECS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: xscout
  ECS_CLUSTER: xscout
  ECS_TASK_FAMILY: xscout
  CONTAINER_NAME: xscout

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-file: deploy/ecs-task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            XSCOUT_TICKERS=${{ vars.XSCOUT_TICKERS || 'AAPL,MSFT,GOOG,AMZN,NVDA,TSLA' }}

      - name: Register new ECS task definition
        id: register-task-def
        env:
          TASK_DEF_FILE: ${{ steps.render-task-def.outputs.task-definition }}
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://$TASK_DEF_FILE \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-definition-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update scheduled task (EventBridge target)
        run: |
          RULE_NAME="${ECS_CLUSTER}-schedule"
          TASK_DEF_ARN="${{ steps.register-task-def.outputs.task-definition-arn }}"

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=${ECS_CLUSTER}-public-*" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',')

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${ECS_CLUSTER}-TaskSecurityGroup-*" \
            --query 'SecurityGroups[0].GroupId' --output text)

          EVENTS_ROLE_ARN=$(aws iam get-role \
            --role-name "${ECS_CLUSTER}-events-role" \
            --query 'Role.Arn' --output text)

          CLUSTER_ARN=$(aws ecs describe-clusters \
            --clusters $ECS_CLUSTER \
            --query 'clusters[0].clusterArn' --output text)

          aws events put-targets --rule "$RULE_NAME" --targets "[{
            \"Id\": \"${ECS_CLUSTER}-target\",
            \"Arn\": \"${CLUSTER_ARN}\",
            \"RoleArn\": \"${EVENTS_ROLE_ARN}\",
            \"EcsParameters\": {
              \"TaskDefinitionArn\": \"${TASK_DEF_ARN}\",
              \"TaskCount\": 1,
              \"LaunchType\": \"FARGATE\",
              \"NetworkConfiguration\": {
                \"awsvpcConfiguration\": {
                  \"Subnets\": [$(echo $SUBNETS | sed 's/,/\",\"/g' | sed 's/^/\"/;s/$/\"/')],
                  \"SecurityGroups\": [\"${SG}\"],
                  \"AssignPublicIp\": \"ENABLED\"
                }
              }
            }
          }]"

          echo "Updated EventBridge rule '$RULE_NAME' with task definition: $TASK_DEF_ARN"
