name: Deploy to Amazon ECS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_task:
        description: "Run the task once after deployment"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'xscout' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'xscout' }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'xscout' }}
  TASK_DEFINITION_FILE: deploy/ecs-task-definition.json
  CONTAINER_NAME: xscout

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

  deploy:
    name: Build image and deploy to ECS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" .
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Register updated task definition
        id: register
        run: |
          set -euo pipefail
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${{ steps.task-def.outputs.task-definition }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_definition_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered: ${TASK_DEF_ARN}"

      - name: Run one-off ECS task (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_task == true }}
        env:
          TASK_DEF_ARN: ${{ steps.register.outputs.task_definition_arn }}
          SUBNETS: ${{ secrets.ECS_SUBNETS }}
          SECURITY_GROUPS: ${{ secrets.ECS_SECURITY_GROUPS }}
          ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP || 'ENABLED' }}
        run: |
          set -euo pipefail
          aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --task-definition "${TASK_DEF_ARN}" \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SECURITY_GROUPS}],assignPublicIp=${ASSIGN_PUBLIC_IP}}" \
            --count 1
